# GitHub Pages: deploy the app at / and the rendered arc42 architecture at /architecture/.
# The architecture is built with docToolchain `generateSite` (the same local flow:
# Java 17 + graphviz + dtcw). WebRTC needs a secure context — Pages serves HTTPS.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (docToolchain requires 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Graphviz (PlantUML/C4 diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Cache docToolchain install
        uses: actions/cache@v4
        with:
          path: ~/.doctoolchain
          key: doctoolchain-3.5.0

      - name: Render arc42 site (docToolchain generateSite)
        env:
          DTC_HEADLESS: "true"
        run: |
          chmod +x dtcw
          ./dtcw local install doctoolchain
          ./dtcw local generateSite

      - name: Assemble Pages artifact (app at /, architecture at /architecture/)
        run: |
          mkdir -p public/architecture
          cp index.html public/
          cp -r build/microsite/output/. public/architecture/
          touch public/.nojekyll

      - uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
