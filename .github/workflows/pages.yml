# GitHub Pages: deploy the static site from the repo root.
# WebRTC braucht einen sicheren Kontext — Pages liefert HTTPS, also passt das.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Pages-Deploy gleichzeitig; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # index.html liegt im Root, kein Build noetig.
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
