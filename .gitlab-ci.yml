# GitLab Pages: publish the static site from public/.
# WebRTC braucht einen sicheren Kontext — Pages liefert HTTPS, also passt das.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp index.html public/
    - cp README.md public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
